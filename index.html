<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>UBIRT</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;background:#101822;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif">
        Loading UBIRT...
      </div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var hash = window.location.hash || "";
        if (!params.has("code") && hash.indexOf("access_token=") === -1) return;
        var path = window.location.pathname || "/";
        if (path === "/oauth-return.html") return;
        var target = "/oauth-return.html" + window.location.search + hash;
        window.location.replace(target);
      })();
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
