<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to UBIRT</title>
    <script>
      (function () {
        var APP_SCHEME = "ubirtai.app";
        var APP_PACKAGE = "ubirtai.app";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var hasAuth = search.indexOf("code=") !== -1 || hash.indexOf("access_token=") !== -1;
        if (!hasAuth) {
          window.location.replace("/");
          return;
        }

        var deepLink = APP_SCHEME + "://login" + search + hash;
        var isAndroid = /Android/i.test(navigator.userAgent);

        if (isAndroid) {
          var intent =
            "intent://login" +
            search +
            hash +
            "#Intent;scheme=" +
            APP_SCHEME +
            ";package=" +
            APP_PACKAGE +
            ";end";
          window.location.replace(intent);
        } else {
          window.location.replace(deepLink);
        }

        setTimeout(function () {
          window.location.replace(deepLink);
        }, 600);

        setTimeout(function () {
          document.getElementById("hint").textContent =
            "If the app did not open, close this tab and open UBIRT from your home screen.";
        }, 2500);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #101822;
        color: #94a3b8;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
    </style>
  </head>
  <body>
    <p id="hint">Returning to UBIRT…</p>
  </body>
</html>
